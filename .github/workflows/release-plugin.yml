name: Release Plugin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLUGIN_NAME: AI Subtitle Studio
  PLUGIN_SLUG: ai-subtitle-studio
  PLUGIN_IDENTIFIER: io.iina.ai-subtitle-studio

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Info.json"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "pref.html"
      - "sidebar.html"
      - ".gitignore"
      - ".parcelrc"
      - ".editorconfig"
      - "jsconfig.json"
      - ".github/workflows/release-plugin.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(node -p "require('./Info.json').version")
          if [ -z "$VERSION" ]; then
            echo "Plugin version is empty" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release package
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          PACKAGE_NAME="${PLUGIN_IDENTIFIER}.iinaplugin"
          PACKAGE_ROOT="release/${PACKAGE_NAME}"
          ARCHIVE_NAME="${PACKAGE_NAME}-${VERSION}.iinaplgz"

          rm -rf "release"
          mkdir -p "${PACKAGE_ROOT}"

          cp Info.json "${PACKAGE_ROOT}/"
          cp README.md "${PACKAGE_ROOT}/"
          cp jsconfig.json "${PACKAGE_ROOT}/"
          cp package.json "${PACKAGE_ROOT}/"
          cp package-lock.json "${PACKAGE_ROOT}/"
          cp pref.html "${PACKAGE_ROOT}/"
          cp sidebar.html "${PACKAGE_ROOT}/"
          cp -R dist "${PACKAGE_ROOT}/dist"
          cp -R src "${PACKAGE_ROOT}/src"
          rm -f "${PACKAGE_ROOT}/dist/index.js.map"

          cd "${PACKAGE_ROOT}"
          zip -r -q "../${ARCHIVE_NAME}" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ env.PLUGIN_NAME }} v${{ steps.version.outputs.value }}
          generate_release_notes: true
          prerelease: false
          files: release/*.iinaplgz
