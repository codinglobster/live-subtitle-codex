<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Subtitle</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    body {
      margin: 0;
      padding: 12px;
      background: transparent;
      color: CanvasText;
    }

    .panel {
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 10px;
      padding: 12px;
      background: rgba(127, 127, 127, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.45;
      opacity: 0.85;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
      background: #0a84ff;
      color: white;
    }

    button.secondary {
      background: rgba(127, 127, 127, 0.25);
      color: inherit;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-weight: 600;
    }

    .log {
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="panel">
    <h1>AI Subtitle Studio</h1>
    <p>Extract the current video's audio, send it to Groq Whisper, then load the generated SRT subtitle automatically.</p>
    <div class="actions">
      <button id="transcribe-button">Generate SRT</button>
      <button id="search-button" class="secondary">Paste Filename</button>
    </div>
    <div id="status" class="status">Ready</div>
    <div id="log" class="log"></div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const transcribeButton = document.getElementById("transcribe-button");
    const searchButton = document.getElementById("search-button");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setLog(text) {
      logEl.textContent = text || "";
    }

    function setBusy(busy) {
      transcribeButton.disabled = busy;
    }

    transcribeButton.addEventListener("click", () => {
      setBusy(true);
      setStatus("Generating subtitles...");
      setLog("");
      iina.postMessage("ai-transcribe", {});
    });

    searchButton.addEventListener("click", () => {
      iina.postMessage("ai-fill-filename", {});
    });

    iina.onMessage("ai-result", ({ ok, result, error }) => {
      setBusy(false);
      if (ok) {
        setStatus("Subtitle loaded");
        setLog(
          `Model: ${result.model}\nSegments: ${result.segmentCount}\nPath: ${result.path}`,
        );
      } else {
        setStatus("Failed");
        setLog(error || "Unknown error");
      }
    });

    iina.onMessage("ai-progress", ({ message }) => {
      setStatus(message || "Working...");
    });

    iina.onMessage("ai-filename", ({ name }) => {
      setStatus("Current file");
      setLog(name || "");
    });

    setStatus("Ready");
    iina.postMessage("ai-sidebar-ready", {});
  </script>
</body>

</html>
